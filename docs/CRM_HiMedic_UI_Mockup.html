<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi-Medic CRM – UI Mockup theo Module</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',500:'#0891b2',600:'#0e7490',700:'#155e75',800:'#164e63',900:'#083344'},
          accent: { 500:'#10b981',600:'#059669'},
        },
        fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
      }
    }
  }
</script>
<style>
  body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9}
  .scroll-thin::-webkit-scrollbar{width:6px;height:6px}
  .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  .phone-frame{width:380px;height:760px;border-radius:42px;background:#0f172a;padding:14px;box-shadow:0 30px 60px -20px rgba(0,0,0,.35)}
  .phone-screen{width:100%;height:100%;border-radius:30px;background:#f8fafc;overflow:hidden;position:relative;display:flex;flex-direction:column}
  .phone-notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#0f172a;border-radius:20px;z-index:30}
  .kanban-card{transition:transform .15s ease, box-shadow .15s ease}
  .kanban-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px -8px rgba(15,23,42,.18)}
  .tab-active{background:white;color:#0e7490;box-shadow:0 1px 0 0 white;border-color:#cbd5e1 #cbd5e1 white #cbd5e1}
  details>summary{list-style:none;cursor:pointer}
  details>summary::-webkit-details-marker{display:none}
  .pulse-dot{position:relative}
  .pulse-dot::before{content:"";position:absolute;inset:0;border-radius:9999px;background:inherit;animation:pulse 1.6s ease-out infinite;opacity:.6}
  @keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.6);opacity:0}}
</style>
</head>
<body class="text-slate-800">

<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-72 bg-brand-900 text-brand-100 flex flex-col flex-shrink-0">
    <div class="px-5 py-5 border-b border-brand-700/60">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-300 to-cyan-600 flex items-center justify-center text-brand-900 font-extrabold text-lg">H</div>
        <div>
          <div class="font-bold text-white text-base leading-none">Hi-Medic CRM</div>
          <div class="text-xs text-brand-200 mt-1">UI Mockup · v1.0</div>
        </div>
      </div>
    </div>

    <nav id="navList" class="flex-1 overflow-y-auto scroll-thin py-3 px-3 space-y-1 text-sm">
      <!-- filled by JS -->
    </nav>

    <div class="px-4 py-3 border-t border-brand-700/60 text-[11px] text-brand-300 leading-relaxed">
      Click vào module để xem các màn hình thiết kế.<br>
      Mỗi module có 2-4 màn hình (desktop & mobile).
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- TOP BAR -->
    <header class="h-14 bg-white border-b border-slate-200 flex items-center px-6 gap-4 flex-shrink-0">
      <div class="text-sm text-slate-500 flex items-center gap-2">
        <span>Hi-Medic CRM</span>
        <span class="text-slate-300">/</span>
        <span id="moduleTitle" class="text-slate-800 font-medium">Tổng quan</span>
      </div>
      <div class="ml-auto flex items-center gap-3">
        <div class="relative">
          <input type="text" placeholder="Tìm khách tiềm năng, cơ hội, khách hàng..." class="w-72 pl-9 pr-3 py-1.5 text-sm bg-slate-100 rounded-lg border border-transparent focus:border-brand-500 focus:bg-white outline-none">
          <svg class="w-4 h-4 absolute left-3 top-2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <button class="relative p-2 hover:bg-slate-100 rounded-lg">
          <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <div class="flex items-center gap-2 pl-3 border-l border-slate-200">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 text-white grid place-items-center text-sm font-semibold">NL</div>
          <div class="text-xs leading-tight">
            <div class="font-medium">Nguyễn Lan</div>
            <div class="text-slate-500">Sales · Q.7</div>
          </div>
        </div>
      </div>
    </header>

    <!-- MODULE CONTENT -->
    <section id="mainContent" class="flex-1 overflow-y-auto scroll-thin bg-slate-100">
      <!-- filled by JS -->
    </section>
  </main>
</div>

<script>
/* =========================================================
   DATA – module list + screen list
   ========================================================= */
const MODULES = [
  { id:'overview', name:'Tổng quan', icon:icon('layout-grid'), screens:[{id:'home',name:'Welcome'}] },
  { id:'lead',     name:'1. Quản lý Khách tiềm năng', icon:icon('user-plus'),
      screens:[{id:'list',name:'Danh sách khách'},{id:'kanban',name:'Luồng chuyển đổi'},{id:'detail',name:'Chi tiết khách'}] },
  { id:'deal',     name:'2. Quản lý Cơ hội', icon:icon('handshake'),
      screens:[{id:'kanban',name:'Luồng cơ hội'},{id:'detail',name:'Chi tiết cơ hội'}] },
  { id:'contact',  name:'3. Khách hàng & Đơn vị', icon:icon('users'),
      screens:[{id:'list',name:'Danh sách liên hệ'},{id:'profile',name:'Hồ sơ 360°'}] },
  { id:'sample',   name:'4. Lấy mẫu', icon:icon('test-tube'),
      screens:[{id:'list',name:'Đơn lấy mẫu'},{id:'mobile',name:'📱 Quy trình Mobile'}] },
  { id:'logistics',name:'5. Vận chuyển mẫu', icon:icon('truck'),
      screens:[{id:'manifest',name:'Phiếu giao & Theo dõi'},{id:'reception',name:'Tiếp nhận tại Lab'}] },
  { id:'catalog',  name:'6. Danh mục Xét nghiệm', icon:icon('flask'),
      screens:[{id:'tests',name:'Danh mục test'},{id:'package',name:'Gói combo'}] },
  { id:'tasks',    name:'7. Công việc & Lịch', icon:icon('check-square'),
      screens:[{id:'calendar',name:'Lịch'},{id:'board',name:'Bảng công việc'}] },
  { id:'comm',     name:'8. Giao tiếp đa kênh', icon:icon('message-square'),
      screens:[{id:'inbox',name:'Hộp thư hợp nhất'},{id:'portal',name:'Cổng khách hàng'}] },
  { id:'marketing',name:'9. Tiếp thị & Phân khách', icon:icon('megaphone'),
      screens:[{id:'campaigns',name:'Hiệu quả chiến dịch'},{id:'routing',name:'Quy tắc phân khách'}] },
  { id:'reports',  name:'10. Báo cáo & Phân tích', icon:icon('bar-chart'),
      screens:[{id:'sales',name:'Bảng KD'},{id:'ops',name:'Bảng vận hành'}] },
  { id:'mobile',   name:'11. 📱 Ứng dụng Mobile (Lấy mẫu)', icon:icon('smartphone'),
      screens:[
        {id:'login',name:'Đăng nhập'},
        {id:'home',name:'Trang chủ'},
        {id:'route',name:'Lịch tuyến'},
        {id:'orderDetail',name:'Chi tiết đơn'},
        {id:'consult',name:'Tư vấn & Chọn XN'},
        {id:'verify',name:'Xác minh KH'},
        {id:'collect',name:'Lấy mẫu'},
        {id:'sign',name:'Ký số & In tem'},
        {id:'handover',name:'Bàn giao Lab'},
        {id:'history',name:'Lịch sử & Thông báo'},
      ] },
  { id:'admin',    name:'12. Admin & Settings', icon:icon('settings'),
      screens:[{id:'users',name:'Người dùng & Quyền'},{id:'workflow',name:'Trình tạo quy trình'}] },
];

/* =========================================================
   Inline icon helper
   ========================================================= */
function icon(name){
  const I = {
    'layout-grid':'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',
    'user-plus':'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>',
    'handshake':'<path d="m11 17 2 2a1 1 0 0 0 3 0c0-.5-.5-1-1-1l-2-2"/><path d="m14 14 2.5 2.5a1 1 0 0 0 3 0c0-.5-.5-1-1-1L17 14"/><path d="m17 11 2 2a1 1 0 0 0 3 0c0-.5-.5-1-1-1l-5-5-5 5"/><path d="m4 13 4-4 4 4-4 4z"/>',
    'users':'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    'test-tube':'<path d="M14.5 2v17.5c0 1.4-1.1 2.5-2.5 2.5h0c-1.4 0-2.5-1.1-2.5-2.5V2"/><path d="M8.5 2h7"/><path d="M14.5 16h-5"/>',
    'truck':'<rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>',
    'flask':'<path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/>',
    'check-square':'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    'message-square':'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
    'megaphone':'<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
    'bar-chart':'<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>',
    'smartphone':'<rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>',
    'settings':'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  };
  return `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${I[name]||''}</svg>`;
}

/* =========================================================
   Render sidebar
   ========================================================= */
const navEl = document.getElementById('navList');
MODULES.forEach(m=>{
  const a = document.createElement('button');
  a.className='w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-brand-800 text-left transition';
  a.innerHTML = `<span class="text-brand-200">${m.icon}</span><span>${m.name}</span>`;
  a.onclick = ()=>select(m.id, m.screens[0].id);
  a.dataset.module = m.id;
  navEl.appendChild(a);
});

/* =========================================================
   Module screens factory
   ========================================================= */
const SCREENS = {};

/* ---- helpers ---- */
const tag = (txt,color) => `<span class="inline-block px-2 py-0.5 text-xs font-medium rounded-full bg-${color}-100 text-${color}-700">${txt}</span>`;
const avatar = (initials,from='emerald',to='emerald-600') => `<div class="w-7 h-7 rounded-full bg-gradient-to-br from-${from}-400 to-${to} text-white grid place-items-center text-[11px] font-semibold flex-shrink-0">${initials}</div>`;

function screenHeader(title, subtitle, actionsHtml=''){
  return `<div class="px-6 pt-5 pb-3 bg-white border-b border-slate-200">
    <div class="flex items-start gap-4">
      <div>
        <h2 class="text-lg font-semibold text-slate-800">${title}</h2>
        <p class="text-xs text-slate-500 mt-0.5">${subtitle}</p>
      </div>
      <div class="ml-auto flex items-center gap-2">${actionsHtml}</div>
    </div></div>`;
}

function tabs(screens, current, moduleId){
  return `<div class="px-6 pt-3 bg-white border-b border-slate-200 flex gap-1 text-sm">
    ${screens.map(s=>`
      <button onclick="select('${moduleId}','${s.id}')"
        class="px-4 py-2 border-b-2 ${s.id===current?'border-brand-600 text-brand-700 font-medium':'border-transparent text-slate-500 hover:text-slate-800'}">
        ${s.name}
      </button>`).join('')}
  </div>`;
}

/* =========================================================
   OVERVIEW
   ========================================================= */
SCREENS.overview = {
  home: () => `
    <div class="p-10 max-w-5xl mx-auto">
      <div class="rounded-2xl bg-gradient-to-br from-brand-700 via-brand-600 to-cyan-500 text-white p-10 shadow-xl">
        <h1 class="text-3xl font-extrabold">Hi-Medic CRM · Bộ thiết kế giao diện</h1>
        <p class="mt-3 text-cyan-50 max-w-2xl">Tổng cộng 12 module – mỗi module có 2 đến 4 màn hình thiết kế chi tiết, bao gồm cả phiên bản desktop cho văn phòng và phiên bản mobile cho đội lấy mẫu tại hiện trường.</p>
        <div class="mt-6 flex gap-3 flex-wrap text-sm">
          <span class="px-3 py-1 rounded-full bg-white/15">Frappe CRM base</span>
          <span class="px-3 py-1 rounded-full bg-white/15">Tùy chỉnh y tế</span>
          <span class="px-3 py-1 rounded-full bg-white/15">Lấy mẫu hiện trường</span>
          <span class="px-3 py-1 rounded-full bg-white/15">Tích hợp LIS</span>
        </div>
      </div>

      <h3 class="mt-10 mb-4 font-semibold text-slate-700 text-sm uppercase tracking-wide">12 Module thiết kế</h3>
      <div class="grid grid-cols-3 gap-4">
        ${MODULES.filter(m=>m.id!=='overview').map(m=>`
          <button onclick="select('${m.id}','${m.screens[0].id}')" class="text-left bg-white rounded-xl border border-slate-200 p-4 hover:border-brand-500 hover:shadow-md transition">
            <div class="w-9 h-9 rounded-lg bg-brand-50 text-brand-700 grid place-items-center mb-3">${m.icon}</div>
            <div class="font-semibold text-slate-800 text-sm">${m.name}</div>
            <div class="text-xs text-slate-500 mt-1">${m.screens.length} màn hình</div>
          </button>`).join('')}
      </div>
    </div>`
};

/* =========================================================
   1. LEAD MANAGEMENT
   ========================================================= */
const LEADS = [
  { name:'Chị Hương Trần',          phone:'0908 123 456', org:'Cá nhân',                  source:'FB Ads',    score:82, stage:'New',       owner:'Nguyễn Lan',  area:'Q.7',  campaign:'GoiKhamTongQuat-T05', last:'2 phút' },
  { name:'PK Đa khoa Hoàng Anh',    phone:'028 3895 1122', org:'PK Đa khoa Hoàng Anh',     source:'Google Ads',score:74, stage:'Contacted', owner:'Trần Minh',   area:'Bình Tân', campaign:'B2B-Q2',          last:'12 phút' },
  { name:'Anh Phạm Quốc Hùng',      phone:'0913 778 901', org:'Cty TNHH Hùng Phát',        source:'Zalo OA',   score:91, stage:'Qualified', owner:'Nguyễn Lan',  area:'Q.7',  campaign:'KCN-VSIP-T04',     last:'1 giờ' },
  { name:'BV Đa khoa Tâm Phúc',     phone:'028 6677 8899', org:'BV Đa khoa Tâm Phúc',      source:'Sự kiện',   score:68, stage:'Nurturing', owner:'Lê Hoài',     area:'Q.10', campaign:'Triển lãm Y tế',   last:'4 giờ' },
  { name:'Chị Lưu Diệu Linh',       phone:'0987 555 333', org:'Cá nhân',                  source:'Hotline',   score:55, stage:'New',       owner:'Trần Minh',   area:'Q.Bình Thạnh', campaign:'-', last:'8 phút' },
  { name:'Cty CP May Sao Mai',      phone:'028 3944 0011', org:'Cty CP May Sao Mai',       source:'Sales tự',  score:78, stage:'Qualified', owner:'Lê Hoài',     area:'Q.12', campaign:'-',                last:'1 ngày' },
];

const STAGE_VN = {New:'Mới', Contacted:'Đã liên hệ', Qualified:'Đủ điều kiện', Nurturing:'Chăm sóc', Converted:'Đã chuyển đổi', Lost:'Đã hủy'};
const stageColor = {New:'sky', Contacted:'amber', Qualified:'emerald', Nurturing:'violet', Converted:'cyan', Lost:'rose'};

SCREENS.lead = {
  list: () => `
    ${screenHeader('Danh sách Khách tiềm năng', 'Tổng 247 khách · 38 mới hôm nay · Thời gian phản hồi TB: 28 phút (mục tiêu 30)',
      `<button class="px-3 py-1.5 text-sm bg-white border border-slate-200 rounded-lg hover:bg-slate-50">Nhập từ Excel</button>
       <button class="px-3 py-1.5 text-sm bg-brand-600 text-white rounded-lg hover:bg-brand-700">+ Thêm khách</button>`)}
    <div class="p-6">
      <div class="flex gap-2 mb-4 flex-wrap">
        ${['Tất cả (247)','Tôi phụ trách (42)','Mới hôm nay (38)','Quá SLA (3)','Marketing chuyển','Sales tự phát triển'].map((t,i)=>`
          <button class="px-3 py-1.5 text-sm rounded-lg border ${i===0?'bg-brand-50 border-brand-300 text-brand-700':'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">${t}</button>`).join('')}
        <div class="ml-auto flex gap-2">
          <select class="px-3 py-1.5 text-sm bg-white border border-slate-200 rounded-lg"><option>Tất cả nguồn</option></select>
          <select class="px-3 py-1.5 text-sm bg-white border border-slate-200 rounded-lg"><option>Tất cả khu vực</option></select>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wide">
            <tr>
              <th class="text-left p-3 w-8"><input type="checkbox" class="rounded"></th>
              <th class="text-left p-3">Tên / Đơn vị</th>
              <th class="text-left p-3">Liên hệ</th>
              <th class="text-left p-3">Nguồn</th>
              <th class="text-left p-3">Score</th>
              <th class="text-left p-3">Trạng thái</th>
              <th class="text-left p-3">Khu vực</th>
              <th class="text-left p-3">Phụ trách</th>
              <th class="text-left p-3">Cập nhật</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            ${LEADS.map((l,i)=>`
              <tr class="hover:bg-slate-50 cursor-pointer" onclick="select('lead','detail')">
                <td class="p-3"><input type="checkbox" class="rounded"></td>
                <td class="p-3">
                  <div class="font-medium text-slate-800">${l.name}</div>
                  <div class="text-xs text-slate-500">${l.org}</div>
                </td>
                <td class="p-3 text-slate-600">${l.phone}</td>
                <td class="p-3">${tag(l.source, l.source==='FB Ads'?'blue':l.source==='Google Ads'?'amber':l.source==='Zalo OA'?'sky':l.source==='Hotline'?'rose':l.source==='Sự kiện'?'violet':'slate')}</td>
                <td class="p-3">
                  <div class="flex items-center gap-2">
                    <div class="w-14 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                      <div class="h-full ${l.score>=80?'bg-emerald-500':l.score>=60?'bg-amber-500':'bg-rose-500'}" style="width:${l.score}%"></div>
                    </div>
                    <span class="text-xs font-medium">${l.score}</span>
                  </div>
                </td>
                <td class="p-3">${tag(STAGE_VN[l.stage]||l.stage, stageColor[l.stage])}</td>
                <td class="p-3 text-slate-600">${l.area}</td>
                <td class="p-3"><div class="flex items-center gap-2">${avatar(l.owner.split(' ').slice(-1)[0][0]+l.owner[0])}<span class="text-xs">${l.owner}</span></div></td>
                <td class="p-3 text-xs text-slate-500">${l.last}</td>
              </tr>`).join('')}
          </tbody>
        </table>
        <div class="px-4 py-3 border-t border-slate-100 flex items-center justify-between text-xs text-slate-500">
          <span>Hiển thị 6 / 247 lead</span>
          <div class="flex gap-1">

/* =========================================================
   ROUTER
   ========================================================= */
function select(moduleId, screenId){
  const mod = MODULES.find(m=>m.id===moduleId);
  if(!mod) return;
  // sidebar highlight
  document.querySelectorAll('#navList button').forEach(b=>{
    b.classList.toggle('bg-brand-700', b.dataset.module===moduleId);
    b.classList.toggle('text-white', b.dataset.module===moduleId);
  });
  document.getElementById('moduleTitle').textContent = mod.name;

  const main = document.getElementById('mainContent');
  // Build tabs (if more than 1 screen) + render screen
  let html = '';
  if(mod.screens.length>1){
    html += tabs(mod.screens, screenId, moduleId);
  }
  const screenFn = SCREENS[moduleId] && SCREENS[moduleId][screenId];
  html += screenFn ? screenFn() : `<div class="p-10 text-slate-400">Màn hình đang được phác thảo…</div>`;
  main.innerHTML = html;
  main.scrollTop = 0;
}
