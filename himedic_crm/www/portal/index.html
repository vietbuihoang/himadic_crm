{% raw %}<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi-Medic — Cổng khách hàng</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#ecfeff',600:'#0e7490',700:'#155e75',900:'#083344'}}}}}</script>
<style>body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9}.scroll-thin::-webkit-scrollbar{width:0}</style>
</head>
<body>{% endraw %}
<script>window.hmUser="{{ user }}";window.hmFullname="{{ full_name }}";window.hmIsCustomer={{ is_customer }};window.csrf_token="{{ csrf_token }}";</script>
{% raw %}<div class="max-w-md mx-auto min-h-screen bg-white shadow-sm flex flex-col">
  <header class="bg-brand-700 text-white px-5 py-4 flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg bg-cyan-300 text-brand-900 grid place-items-center font-bold">H</div>
    <div class="font-semibold">Hi-Medic</div>
    <div id="p-who" class="ml-auto text-xs text-cyan-100"></div>
  </header>
  <main id="p-main" class="flex-1 overflow-y-auto scroll-thin p-5"></main>
</div>{% endraw %}
<script type="module" src="/assets/himedic_crm/js/portal/app.js"></script>
</body>
</html>
