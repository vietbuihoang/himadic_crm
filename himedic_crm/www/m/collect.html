{% extends "templates/web.html" %}
{% block page_content %}
<style>body{background:#F8FAFC;font-family:Inter,system-ui}.m-shell{max-width:480px;margin:0 auto;padding:1rem}.m-card{background:white;border-radius:14px;padding:1rem;margin:.75rem 0}</style>
<div class="m-shell">
  <a href="javascript:history.back()">← Quay lại</a>
  <div class="m-card">
    <h3>Quét barcode ống mẫu</h3>
    <input id="bar" placeholder="Quét barcode hoặc nhập" style="width:100%;padding:.5rem;border:1px solid #cbd5e1;border-radius:8px">
    <button class="hm-btn" onclick="HM.scan()">+ Thêm ống</button>
    <ul id="tubes" style="margin-top:.75rem"></ul>
  </div>
</div>
<script>
HM.tubes = [];
HM.scan = function() {
  const v = document.getElementById("bar").value.trim();
  if (!v) return;
  HM.tubes.push(v);
  const ul = document.getElementById("tubes");
  ul.insertAdjacentHTML("beforeend", `<li>🧪 ${v}</li>`);
  document.getElementById("bar").value = "";
};
</script>
{% endblock %}
