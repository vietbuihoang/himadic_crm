{% raw %}<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hi-Medic Field</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#ecfeff',500:'#06b6d4',600:'#0e7490',700:'#155e75',900:'#083344'}}}}}</script>
<style>
  body{font-family:Inter,system-ui,sans-serif;background:#0f172a}
  #m-app{max-width:480px;margin:0 auto;min-height:100vh;background:#f1f5f9;display:flex;flex-direction:column}
  .m-sig{touch-action:none;background:#fff;border:1px dashed #94a3b8;border-radius:12px;width:100%;height:160px}
  .scroll-thin::-webkit-scrollbar{width:0}
</style>
</head>
<body>{% endraw %}
<script>window.hmUser="{{ user }}";window.hmFullname="{{ full_name }}";window.csrf_token="{{ csrf_token }}";</script>
{% raw %}<div id="m-app">
  <header class="bg-brand-900 text-white px-4 py-3 flex items-center gap-2 sticky top-0 z-20">
    <button id="m-back" class="hidden text-white/80 text-lg">‹</button>
    <div class="font-bold text-sm flex items-center gap-1">📱 Hi-Medic Field</div>
    <div id="m-title" class="text-xs text-cyan-100 ml-1"></div>
    <div class="ml-auto text-[11px] text-cyan-200" id="m-who"></div>
  </header>
  <main id="m-main" class="flex-1 overflow-y-auto scroll-thin p-4"></main>
  <nav id="m-nav" class="bg-white border-t border-slate-200 grid grid-cols-4 text-xs sticky bottom-0 z-20"></nav>
</div>{% endraw %}
<script type="module" src="/assets/himedic_crm/js/m/app.js"></script>
</body>
</html>
