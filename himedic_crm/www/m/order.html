{% extends "templates/web.html" %}
{% block page_content %}
<style>body{background:#F1F5F9;font-family:Inter,system-ui;} .m-shell{max-width:480px;margin:0 auto;padding:1rem;} .m-card{background:white;border-radius:14px;padding:1rem;margin:.75rem 0;}</style>
<div class="m-shell">
  <a href="/m">← Quay lại</a>
  <div class="m-card"><div id="root">Đang tải…</div></div>
  <div class="m-card">
    <h3>Hành động</h3>
    <button class="hm-btn" onclick="HM.checkin()">📍 Check-in GPS</button>
    <button class="hm-btn" onclick="location.href='/m/consult?name='+name">🧪 Tư vấn & Chọn XN</button>
    <button class="hm-btn" onclick="location.href='/m/collect?name='+name">💉 Lấy mẫu</button>
    <button class="hm-btn" onclick="location.href='/m/sign?name='+name">✍️ Ký số khách</button>
  </div>
</div>
<script>
const url = new URL(location.href);
const name = url.searchParams.get("name");
(async () => {
  const so = await HM.api("himedic_crm.api.mobile.order_detail", { name });
  document.getElementById("root").innerHTML = `
    <h3>${so.contact} <small>${so.appointment_date} ${so.appointment_time||""}</small></h3>
    <div>${so.address || ""}</div>
    <div>Trạng thái: <b>${so.status}</b></div>
    <div>Tổng: <b>${(so.grand_total||0).toLocaleString()}đ</b></div>
  `;
})();
HM.checkin = function(){
  navigator.geolocation?.getCurrentPosition(async (pos)=>{
    const r = await HM.api("himedic_crm.sample.flows.checkin", { sample_order: name, lat: pos.coords.latitude, lng: pos.coords.longitude });
    alert(r?.ok ? "✅ Đã check-in" : "❌ "+ (r?.error||""));
  });
};
</script>
{% endblock %}
